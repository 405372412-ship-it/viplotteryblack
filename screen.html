<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VIP礼品直播抽奖大屏</title>
  <style>
    :root {
      --gold: #f8cf74;
      --gold-2: #b77b25;
      --gold-3: #fff1b9;
      --ink: #fff8e8;
      --muted: #d8c28f;
      --line: rgba(248,207,116,.26);
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      color-scheme: dark;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(0,0,0,.30), rgba(0,0,0,.78)),
        url("assets/vip-lottery-black-gold-bg.png") center / cover no-repeat fixed,
        #080604;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 50% 44%, rgba(248,207,116,.16), transparent 28%),
        linear-gradient(90deg, rgba(0,0,0,.55), transparent 30%, transparent 70%, rgba(0,0,0,.55));
      pointer-events: none;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px);
      background-size: 80px 80px;
      mask-image: radial-gradient(circle, black 0 45%, transparent 78%);
      pointer-events: none;
      opacity: .22;
    }

    .screen {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      padding: 28px min(4vw, 58px) 24px;
      gap: 18px;
    }

    header {
      display: grid;
      grid-template-columns: minmax(170px, 1fr) minmax(320px, auto) minmax(220px, 1fr);
      align-items: center;
      gap: 18px;
    }

    .title-wrap {
      grid-column: 2;
      justify-self: center;
      text-align: center;
      min-width: 0;
    }

    .event-kicker {
      display: none;
      color: var(--gold);
      font-size: 16px;
      font-weight: 700;
      text-transform: uppercase;
    }

    h1, h2, p { margin: 0; }

    h1 {
      position: relative;
      display: inline-block;
      max-width: 980px;
      font-size: 46px;
      line-height: 1.18;
      font-weight: 900;
      color: transparent;
      background: linear-gradient(90deg, #fff8dc, #f8cf74 38%, #ffffff 50%, #c98828 62%, #fff1b9);
      background-size: 260% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      text-shadow: 0 0 34px rgba(248,207,116,.28);
      animation: titleShine 3.2s linear infinite, titleGlow 1.8s ease-in-out infinite alternate;
    }

    h1::after {
      content: "";
      position: absolute;
      top: -10%;
      bottom: -10%;
      left: -18%;
      width: 16%;
      transform: skewX(-18deg);
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.85), transparent);
      filter: blur(1px);
      animation: titleSweep 2.8s ease-in-out infinite;
      pointer-events: none;
    }

    .status {
      min-width: 170px;
      min-height: 54px;
      border: 1px solid var(--line);
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: #161008;
      background: linear-gradient(180deg, #fff0b7, #c58a2f);
      box-shadow: 0 0 38px rgba(248,207,116,.24);
      font-weight: 900;
    }

    .top-actions {
      grid-column: 3;
      justify-self: end;
    }

    .audio-btn {
      width: 54px;
      min-width: 54px;
      height: 54px;
      min-height: 54px;
      border: 1px solid rgba(248,207,116,.46);
      border-radius: 50%;
      color: #161008;
      background: linear-gradient(180deg, #fff0b7, #c58a2f);
      box-shadow: 0 0 36px rgba(248,207,116,.22);
      font: inherit;
      font-size: 22px;
      font-weight: 900;
      line-height: 1;
      cursor: pointer;
    }

    .audio-btn.muted {
      color: var(--ink);
      background: rgba(9, 8, 6, .68);
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      justify-content: flex-end;
    }

    .draw-controls {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      padding: 6px 0 2px;
    }

    .control-btn {
      min-width: 128px;
      min-height: 46px;
      border: 1px solid rgba(248,207,116,.40);
      border-radius: 8px;
      color: var(--ink);
      background: linear-gradient(180deg, rgba(70, 50, 20, .92), rgba(12, 10, 7, .84));
      box-shadow: 0 0 22px rgba(248,207,116,.12);
      font: inherit;
      font-weight: 900;
      cursor: pointer;
    }

    .control-btn:hover { border-color: var(--gold); transform: translateY(-1px); }
    .control-btn.primary { color: #171008; background: linear-gradient(180deg, #fff0b7, #c58a2f); }
    .control-btn.subtle { color: var(--muted); background: rgba(8, 7, 5, .62); }

    .overview {
      --overview-cols: 4;
      position: relative;
      display: grid;
      grid-template-columns: repeat(var(--overview-cols), minmax(0, 1fr));
      gap: 18px;
      align-content: center;
      justify-content: center;
      min-height: min(68vh, 690px);
      width: 100%;
      max-width: 1540px;
      margin: 0 auto;
      perspective: 1400px;
    }

    .overview.count-1 {
      --overview-cols: 1;
      max-width: 460px;
    }

    .overview.count-2 {
      --overview-cols: 2;
      max-width: 920px;
    }

    .overview.count-3 {
      --overview-cols: 3;
      max-width: 1320px;
    }

    .overview.count-1 .round-card,
    .overview.count-2 .round-card,
    .overview.count-3 .round-card {
      min-height: 460px;
    }

    .overview::before {
      content: "";
      position: absolute;
      left: 2%;
      right: 2%;
      bottom: 4%;
      height: 28%;
      border-radius: 50%;
      background: radial-gradient(ellipse at center, rgba(248,207,116,.20), transparent 66%);
      filter: blur(12px);
      pointer-events: none;
    }

    .round-card {
      position: relative;
      min-height: 430px;
      border: 1px solid rgba(248,207,116,.26);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255,241,185,.08), transparent 26%),
        linear-gradient(145deg, rgba(47, 35, 15, .92), rgba(7, 7, 5, .66) 52%, rgba(28, 19, 8, .84));
      box-shadow: 0 28px 72px rgba(0,0,0,.38), inset 0 0 0 1px rgba(255,255,255,.045);
      overflow: hidden;
      padding: 18px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 14px;
      cursor: pointer;
      backdrop-filter: blur(16px);
      transform-style: preserve-3d;
      transition: transform .22s ease, border-color .22s ease, box-shadow .22s ease;
    }

    .round-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 22%, rgba(248,207,116,.20), transparent 45%);
      opacity: .72;
      pointer-events: none;
    }

    .round-card::after {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 8px;
      border: 1px solid rgba(255,241,185,.14);
      background:
        linear-gradient(90deg, transparent, rgba(248,207,116,.10), transparent),
        radial-gradient(circle at 50% 100%, rgba(248,207,116,.18), transparent 46%);
      pointer-events: none;
    }

    .round-card:hover {
      transform: translateY(-6px) rotateX(2deg);
      border-color: rgba(248,207,116,.70);
      box-shadow: 0 0 48px rgba(248,207,116,.18), 0 28px 72px rgba(0,0,0,.42);
    }

    .round-card > * { position: relative; z-index: 1; }

    .round-badge {
      color: var(--gold);
      font-size: 18px;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .round-badge span {
      border: 1px solid rgba(248,207,116,.28);
      border-radius: 999px;
      padding: 5px 9px;
      color: #1a1106;
      background: linear-gradient(180deg, #fff0b7, #c58a2f);
      font-size: 12px;
    }

    .round-thumb {
      display: grid;
      place-items: center;
      min-height: 230px;
      border-radius: 8px;
      border: 1px solid rgba(248,207,116,.18);
      background:
        radial-gradient(circle at 50% 48%, rgba(255,241,185,.26), transparent 34%),
        linear-gradient(180deg, rgba(248,207,116,.12), rgba(0,0,0,.24));
      overflow: hidden;
      box-shadow: inset 0 0 44px rgba(248,207,116,.12);
    }

    .round-thumb img {
      max-width: 100%;
      max-height: 230px;
      object-fit: contain;
      filter: drop-shadow(0 22px 34px rgba(0,0,0,.36));
    }

    .round-info h2 {
      color: var(--gold-3);
      font-size: 28px;
      line-height: 1.18;
      text-align: center;
    }

    .round-info p {
      margin-top: 8px;
      color: var(--muted);
      text-align: center;
      font-size: 15px;
    }

    .enter-btn {
      min-height: 46px;
      border: 1px solid rgba(248,207,116,.45);
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: #171008;
      background: linear-gradient(180deg, #fff0b7, #c58a2f);
      font-weight: 900;
      box-shadow: 0 0 24px rgba(248,207,116,.18);
    }

    .is-overview .draw-controls,
    .is-overview .main {
      display: none;
    }

    .is-draw .overview {
      display: none;
    }

    .is-draw .draw-controls {
      display: flex;
    }

    .main {
      display: grid;
      grid-template-columns: minmax(280px, 410px) minmax(0, 1fr);
      align-items: center;
      gap: 22px;
      min-height: 0;
    }

    .prize-wrap {
      display: grid;
      gap: 8px;
      align-self: center;
    }

    .draw-round-label {
      min-height: 26px;
      padding-left: 2px;
      color: var(--gold);
      font-size: 18px;
      font-weight: 900;
      text-shadow: 0 0 18px rgba(248,207,116,.28);
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: linear-gradient(180deg, rgba(16,13,9,.76), rgba(5,5,4,.50));
      box-shadow: 0 28px 72px rgba(0,0,0,.42);
      backdrop-filter: blur(18px);
      overflow: hidden;
    }

    .panel h2 {
      padding: 15px 18px;
      border-bottom: 1px solid var(--line);
      color: var(--gold);
      font-size: 18px;
      background: linear-gradient(90deg, rgba(248,207,116,.12), transparent);
    }

    .prize {
      min-height: 430px;
      display: grid;
      grid-template-rows: 1fr auto;
      padding: 20px;
    }

    .prize-img {
      position: relative;
      display: grid;
      place-items: center;
      min-height: 260px;
      border-radius: 8px;
      border: 1px solid rgba(248,207,116,.18);
      background: radial-gradient(circle, rgba(248,207,116,.18), rgba(0,0,0,.34) 58%);
      overflow: hidden;
    }

    .prize-img::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      width: 54px;
      height: 4px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, #fff5bd 38%, #f8cf74 70%, transparent);
      box-shadow: 0 0 12px #f8cf74, 0 0 26px rgba(248,207,116,.82);
      animation: borderCursor 3.2s linear infinite;
      pointer-events: none;
      z-index: 3;
    }

    .prize-img::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      border: 1px solid rgba(255,241,185,.36);
      box-shadow: inset 0 0 32px rgba(248,207,116,.20), 0 0 34px rgba(248,207,116,.15);
      pointer-events: none;
      animation: framePulse 1.5s ease-in-out infinite alternate;
    }

    .prize-img img {
      position: relative;
      z-index: 2;
      max-width: 100%;
      max-height: 280px;
      object-fit: contain;
      filter: drop-shadow(0 24px 38px rgba(0,0,0,.45));
    }

    .gift-fallback {
      position: relative;
      z-index: 2;
      width: 170px;
      height: 170px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: linear-gradient(135deg, #3b240a, #d79d34 48%, #fff0b2 50%, #805016);
      box-shadow: 0 0 70px rgba(248,207,116,.36);
      font-size: 70px;
      font-weight: 900;
      color: #170f06;
    }

    .prize-name {
      margin-top: 18px;
      font-size: 31px;
      line-height: 1.22;
      font-weight: 900;
      color: var(--gold-3);
      text-align: center;
    }

    .prize-count {
      margin-top: 8px;
      color: var(--muted);
      text-align: center;
      font-size: 16px;
    }

    .stage {
      position: relative;
      min-height: min(68vh, 670px);
      display: grid;
      place-items: center;
      perspective: 1200px;
    }

    .stage::before,
    .stage::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      opacity: .58;
    }

    .stage::before {
      width: min(54vw, 690px);
      aspect-ratio: 1;
      border: 1px solid rgba(248,207,116,.16);
      box-shadow:
        inset 0 0 0 1px rgba(248,207,116,.07),
        inset 0 0 70px rgba(248,207,116,.06);
      transform: rotateX(66deg) rotateZ(-12deg);
    }

    .stage::after {
      width: min(42vw, 540px);
      aspect-ratio: 1;
      border: 1px dashed rgba(248,207,116,.20);
      transform: rotateX(72deg) rotateZ(18deg);
      animation: orbitLine 10s linear infinite;
    }

    .halo {
      position: absolute;
      width: min(58vw, 720px);
      aspect-ratio: 1;
      border: 1px solid rgba(248,207,116,.20);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(248,207,116,.16), transparent 62%);
      box-shadow: inset 0 0 90px rgba(248,207,116,.12), 0 0 90px rgba(248,207,116,.12);
      animation: pulse 3.4s ease-in-out infinite;
    }

    .orbit {
      position: absolute;
      width: var(--orbit-size, min(46vw, 590px));
      aspect-ratio: 1;
      border: 1px solid rgba(248,207,116,.13);
      border-radius: 50%;
      pointer-events: none;
      transform: rotateX(var(--orbit-x, 68deg)) rotateZ(var(--orbit-z, 0deg));
      box-shadow: 0 0 24px rgba(248,207,116,.05);
      animation: orbitLine var(--orbit-speed, 13s) linear infinite;
    }

    .orbit:nth-child(2) { --orbit-size: min(38vw, 500px); --orbit-x: 62deg; --orbit-z: 52deg; --orbit-speed: 16s; }
    .orbit:nth-child(3) { --orbit-size: min(50vw, 650px); --orbit-x: 74deg; --orbit-z: -42deg; --orbit-speed: 18s; }

    .sphere {
      position: relative;
      width: min(50vw, 620px);
      aspect-ratio: 1;
      transform-style: preserve-3d;
      animation: rotateSphere 16s linear infinite;
      --chip-min-width: 86px;
      --chip-height: 40px;
      --chip-padding: 15px;
      --chip-font-size: 15px;
    }

    .sphere.sparse {
      width: min(55vw, 690px);
      --chip-min-width: 150px;
      --chip-height: 70px;
      --chip-padding: 26px;
      --chip-font-size: 26px;
    }

    .sphere.medium {
      width: min(53vw, 650px);
      --chip-min-width: 118px;
      --chip-height: 54px;
      --chip-padding: 20px;
      --chip-font-size: 20px;
    }

    .sphere.dense {
      --chip-min-width: 86px;
      --chip-height: 40px;
      --chip-padding: 15px;
      --chip-font-size: 15px;
    }

    .chip {
      position: absolute;
      left: 50%;
      top: 50%;
      min-width: var(--chip-min-width);
      height: var(--chip-height);
      padding: 0 var(--chip-padding);
      display: grid;
      place-items: center;
      border: 1px solid rgba(248,207,116,.42);
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(30,23,12,.92), rgba(8,7,5,.80));
      color: var(--gold-3);
      box-shadow: 0 0 22px rgba(248,207,116,.14);
      font-size: var(--chip-font-size);
      font-weight: 800;
      transform-style: preserve-3d;
      white-space: nowrap;
    }

    .running .sphere { animation-duration: 2.1s; }
    .running .chip { box-shadow: 0 0 30px rgba(248,207,116,.32); }
    .few-names .orbit { opacity: .92; border-color: rgba(248,207,116,.22); }
    .few-names .stage::before { opacity: .78; }
    .few-names .stage::after { opacity: .80; }

    .winner-board {
      display: none;
      width: min(980px, 94%);
      min-height: 260px;
      max-height: min(72vh, 650px);
      padding: 34px;
      border: 1px solid rgba(248,207,116,.42);
      border-radius: 8px;
      background: linear-gradient(180deg, rgba(25,18,8,.92), rgba(8,7,5,.82));
      box-shadow: 0 0 80px rgba(248,207,116,.24), inset 0 0 0 1px rgba(255,255,255,.06);
    }

    .ended .winner-board { display: block; }
    .ended .sphere, .ended .halo { display: none; }

    .winner-title {
      color: var(--gold);
      text-align: center;
      font-size: 34px;
      font-weight: 900;
      text-shadow: 0 0 24px rgba(248,207,116,.28);
    }

    .winner-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-top: 26px;
      max-height: 460px;
      overflow: auto;
    }

    .winner-card {
      min-height: 76px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      border: 1px solid rgba(248,207,116,.35);
      color: #1b1205;
      background: linear-gradient(180deg, #fff2bd, #d59a32);
      font-size: 28px;
      font-weight: 900;
      box-shadow: 0 10px 22px rgba(0,0,0,.22);
    }

    .winner-board.few-winners {
      width: min(940px, 94%);
      min-height: 330px;
      padding: 38px;
    }

    .winner-board.few-winners .winner-grid {
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 20px;
      max-height: none;
      overflow: visible;
    }

    .winner-board.few-winners .winner-card {
      min-height: 92px;
      font-size: 32px;
    }

    .winner-board.single-winner {
      width: min(900px, 92%);
      min-height: 340px;
      padding: 42px 48px;
      align-content: center;
    }

    .ended .winner-board.single-winner { display: grid; }

    .winner-board.single-winner .winner-title {
      font-size: 42px;
      margin-bottom: 28px;
    }

    .winner-board.single-winner .winner-grid {
      grid-template-columns: 1fr;
      margin-top: 0;
      max-height: none;
      overflow: visible;
    }

    .winner-board.single-winner .winner-card {
      min-height: 118px;
      font-size: clamp(38px, 5vw, 58px);
      letter-spacing: 0;
      box-shadow: 0 18px 44px rgba(248,207,116,.24), inset 0 1px 0 rgba(255,255,255,.42);
    }

    footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      color: var(--muted);
      font-size: 15px;
    }

    .marquee {
      overflow: hidden;
      white-space: nowrap;
      flex: 1;
      border-top: 1px solid rgba(248,207,116,.18);
      padding-top: 12px;
    }

    .marquee span {
      display: inline-block;
      padding-left: 100%;
      animation: marquee 28s linear infinite;
    }

    canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 3;
    }

    @keyframes rotateSphere {
      from { transform: rotateX(-12deg) rotateY(0deg); }
      to { transform: rotateX(-12deg) rotateY(360deg); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(.96); opacity: .72; }
      50% { transform: scale(1.03); opacity: 1; }
    }

    @keyframes orbitLine {
      from { rotate: 0deg; }
      to { rotate: 360deg; }
    }

    @keyframes marquee {
      from { transform: translateX(0); }
      to { transform: translateX(-100%); }
    }

    @keyframes titleShine {
      from { background-position: 0% 50%; }
      to { background-position: 260% 50%; }
    }

    @keyframes titleSweep {
      0%, 35% { left: -22%; opacity: 0; }
      48% { opacity: 1; }
      70%, 100% { left: 108%; opacity: 0; }
    }

    @keyframes titleGlow {
      from { filter: drop-shadow(0 0 10px rgba(248,207,116,.22)); }
      to { filter: drop-shadow(0 0 26px rgba(248,207,116,.54)); }
    }

    @keyframes borderCursor {
      0% {
        left: 18px;
        top: 0;
        width: 58px;
        height: 4px;
        transform: translateY(-2px) rotate(0deg);
      }
      24% {
        left: calc(100% - 76px);
        top: 0;
        width: 58px;
        height: 4px;
        transform: translateY(-2px) rotate(0deg);
      }
      25% {
        left: calc(100% - 4px);
        top: 18px;
        width: 4px;
        height: 58px;
        transform: translateX(-2px) rotate(0deg);
      }
      49% {
        left: calc(100% - 4px);
        top: calc(100% - 76px);
        width: 4px;
        height: 58px;
        transform: translateX(-2px) rotate(0deg);
      }
      50% {
        left: calc(100% - 76px);
        top: calc(100% - 4px);
        width: 58px;
        height: 4px;
        transform: translateY(-2px) rotate(180deg);
      }
      74% {
        left: 18px;
        top: calc(100% - 4px);
        width: 58px;
        height: 4px;
        transform: translateY(-2px) rotate(180deg);
      }
      75% {
        left: 0;
        top: calc(100% - 76px);
        width: 4px;
        height: 58px;
        transform: translateX(-2px) rotate(180deg);
      }
      99% {
        left: 0;
        top: 18px;
        width: 4px;
        height: 58px;
        transform: translateX(-2px) rotate(180deg);
      }
      100% {
        left: 18px;
        top: 0;
        width: 58px;
        height: 4px;
        transform: translateY(-2px) rotate(0deg);
      }
    }

    @keyframes framePulse {
      from { box-shadow: inset 0 0 24px rgba(248,207,116,.16), 0 0 20px rgba(248,207,116,.12); }
      to { box-shadow: inset 0 0 44px rgba(248,207,116,.34), 0 0 42px rgba(248,207,116,.28); }
    }

    @media (max-width: 1150px) {
      body { overflow: auto; }
      .screen { min-height: 100vh; }
      .overview { grid-template-columns: repeat(2, minmax(0, 1fr)); min-height: auto; }
      .overview.count-1 { grid-template-columns: 1fr; max-width: 460px; }
      .overview.count-2,
      .overview.count-3,
      .overview.count-4,
      .overview.count-many { max-width: 920px; }
      .main { grid-template-columns: 1fr; }
      .prize { min-height: 0; }
      .stage { min-height: 520px; }
      .sphere { width: min(86vw, 560px); }
      .sphere.sparse, .sphere.medium { width: min(88vw, 590px); }
      .halo { width: min(92vw, 640px); }
    }

    @media (max-width: 720px) {
      .screen { padding: 18px 12px; }
      header { grid-template-columns: 1fr; }
      .title-wrap,
      .top-actions { grid-column: auto; justify-self: stretch; text-align: left; }
      h1 { font-size: 30px; }
      .overview { grid-template-columns: 1fr; }
      .round-card { min-height: 360px; }
      .control-btn { width: 100%; }
      .top-actions { width: 100%; }
      .status { flex: 1; }
      .audio-btn { flex: 0 0 54px; }
      .winner-board { padding: 18px; }
      .winner-board.single-winner { padding: 28px 18px; min-height: 270px; }
      .winner-board.single-winner .winner-title { font-size: 30px; }
      .winner-board.single-winner .winner-card { min-height: 92px; font-size: 36px; }
      .winner-title { font-size: 24px; }
      footer { align-items: flex-start; flex-direction: column; }
    }
  </style>
</head>
<body>
  <canvas id="confetti"></canvas>
  <main class="screen" id="screen">
    <header>
      <div class="title-wrap">
        <p class="event-kicker" id="roundName">抽奖轮次总览</p>
        <h1 id="eventName">VIP礼品直播抽奖</h1>
      </div>
      <div class="top-actions">
        <button class="audio-btn muted" id="audioBtn" type="button" aria-label="播放或静音背景音乐" title="播放或静音背景音乐">♪</button>
        <div class="status" id="statusText">待准备</div>
      </div>
    </header>

    <nav class="draw-controls" aria-label="抽奖控制">
      <button class="control-btn subtle" id="backOverviewBtn" type="button">返回总览</button>
      <button class="control-btn" id="startDrawBtn" type="button">开始抽奖</button>
      <button class="control-btn primary" id="endDrawBtn" type="button">抽奖结束</button>
    </nav>

    <section class="overview" id="roundOverview"></section>

    <section class="main">
      <div class="prize-wrap">
        <div class="draw-round-label" id="drawRoundLabel">第一轮</div>
        <aside class="panel prize">
          <div class="prize-img" id="prizeImage"><div class="gift-fallback">礼</div></div>
          <div>
            <div class="prize-name" id="prizeName">神秘礼品</div>
            <div class="prize-count" id="winnerCount">等待后台设置中奖名额</div>
          </div>
        </aside>
      </div>

      <section class="stage">
        <div class="halo"></div>
        <div class="orbit"></div>
        <div class="orbit"></div>
        <div class="orbit"></div>
        <div class="sphere" id="sphere"></div>
        <div class="winner-board">
          <div class="winner-title">恭喜中奖嘉宾</div>
          <div class="winner-grid" id="winnerGrid"></div>
        </div>
      </section>
    </section>

    <footer>
      <div class="marquee"><span id="ticker">请选择要进入的抽奖轮次，前台即可完成准备、开始与开奖。</span></div>
    </footer>
  </main>

  <script>
    const STORE_KEY = "vip_lottery_data_v1";
    const SCREEN_KEY = "vip_lottery_screen_state_v1";
    const $ = (id) => document.getElementById(id);
    const screen = $("screen");
    let lastStage = "";
    let data = loadData();
    let screenState = loadScreenState();
    let selectedRoundId = screenState.roundId || data.rounds[0]?.id || "";
    let currentStage = screenState.stage || "overview";
    let currentWinners = [];
    let confettiTimer = 0;
    let bgmAudio = null;
    let bgmPlaying = false;
    const presetPrizeImages = {
      "电脑": "assets/vip-prize-computer.png",
      "手表": "assets/vip-prize-watch.png",
      "手机": "assets/vip-prize-phone.png",
      "京东卡": "assets/vip-prize-jd-card.png"
    };

    function uid() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
    }

    function defaultData() {
      const names = ["林佳怡", "周明轩", "陈思雨", "王浩然", "李欣然", "赵子涵", "黄嘉豪", "吴雅婷", "郑宇航", "孙若曦", "胡梓晨", "郭雨桐", "何俊杰", "高诗涵", "罗一诺", "梁景行", "宋佳宁", "谢文博", "唐若琳", "许嘉泽", "梁景行", "宋佳宁", "谢文博", "唐若琳"];
      return {
        eventName: "VIP客户专属礼遇抽奖夜",
        participants: names,
        rounds: [
          { id: uid(), name: "第一轮", prizeName: "电脑", prizeValue: "", winnerCount: 1, fixedWinners: [], prizeImage: "assets/vip-prize-computer.png", winners: [] },
          { id: uid(), name: "第二轮", prizeName: "手表", prizeValue: "", winnerCount: 1, fixedWinners: [], prizeImage: "assets/vip-prize-watch.png", winners: [] },
          { id: uid(), name: "第三轮", prizeName: "手机", prizeValue: "", winnerCount: 1, fixedWinners: [], prizeImage: "assets/vip-prize-phone.png", winners: [] },
          { id: uid(), name: "第四轮", prizeName: "京东卡", prizeValue: "", winnerCount: 10, fixedWinners: [], prizeImage: "assets/vip-prize-jd-card.png", winners: [] }
        ],
        records: [],
        updatedAt: Date.now()
      };
    }

    function loadData() {
      try {
        const stored = JSON.parse(localStorage.getItem(STORE_KEY) || "null");
        if (stored?.rounds?.length) {
          return migratePresetRounds(stored);
        }
      } catch (error) {}
      const seeded = defaultData();
      localStorage.setItem(STORE_KEY, JSON.stringify(seeded));
      return seeded;
    }

    function migratePresetRounds(stored) {
      const names = stored.rounds.map((round) => round.prizeName).join("|");
      if (stored.rounds.length === 4 && names === "手机|电脑|现金卡|现金卡") {
        const presets = [
          ["第一轮", "电脑", 1, "assets/vip-prize-computer.png"],
          ["第二轮", "手表", 1, "assets/vip-prize-watch.png"],
          ["第三轮", "手机", 1, "assets/vip-prize-phone.png"],
          ["第四轮", "京东卡", 10, "assets/vip-prize-jd-card.png"]
        ];
        stored.rounds = stored.rounds.map((round, index) => ({
          ...round,
          name: presets[index][0],
          prizeName: presets[index][1],
          prizeValue: "",
          winnerCount: presets[index][2],
          prizeImage: presets[index][3],
          winners: []
        }));
        stored.records = [];
        localStorage.setItem(STORE_KEY, JSON.stringify(stored));
      }
      stored.rounds = stored.rounds.map((round) => ({ prizeValue: "", ...round }));
      return stored;
    }

    function saveData() {
      data.updatedAt = Date.now();
      localStorage.setItem(STORE_KEY, JSON.stringify(data));
    }

    function loadScreenState() {
      try {
        return JSON.parse(localStorage.getItem(SCREEN_KEY) || "{}") || {};
      } catch (error) {
        return {};
      }
    }

    function saveScreenState() {
      localStorage.setItem(SCREEN_KEY, JSON.stringify({ stage: currentStage, roundId: selectedRoundId, updatedAt: Date.now() }));
    }

    function getRound() {
      return data.rounds.find((round) => round.id === selectedRoundId) || data.rounds[0] || {};
    }

    function getPrizeImage(round) {
      return round.prizeImage || presetPrizeImages[round.prizeName] || "";
    }

    function buildPrizeMeta(round) {
      const value = String(round?.prizeValue || "").trim();
      const countText = `${round?.winnerCount || 1} 个中奖名额`;
      return value ? `价值${value}元 · ${countText}` : countText;
    }

    function renderOverview() {
      const overview = $("roundOverview");
      overview.innerHTML = "";
      overview.classList.remove("count-1", "count-2", "count-3", "count-4", "count-many");
      const roundCount = data.rounds.length;
      overview.classList.add(roundCount <= 1 ? "count-1" : roundCount === 2 ? "count-2" : roundCount === 3 ? "count-3" : roundCount === 4 ? "count-4" : "count-many");
      data.rounds.forEach((round, index) => {
        const card = document.createElement("article");
        card.className = "round-card";
        const image = getPrizeImage(round);
        card.innerHTML = `
          <div class="round-badge">${round.name || `第${index + 1}轮`}<span>PRIZE ${index + 1}</span></div>
          <div class="round-thumb">${image ? `<img src="${image}" alt="${round.prizeName || "奖品"}">` : '<div class="gift-fallback">礼</div>'}</div>
          <div class="round-info">
            <h2>${round.prizeName || "神秘礼品"}</h2>
            <p>${buildPrizeMeta(round)}</p>
          </div>
          <div class="enter-btn">进入${round.name || `第${index + 1}轮`}抽奖</div>
        `;
        card.addEventListener("click", () => enterRound(round.id));
        overview.appendChild(card);
      });
    }

    function render() {
      data = loadData();
      if (!data.rounds.some((round) => round.id === selectedRoundId)) selectedRoundId = data.rounds[0]?.id || "";
      const round = getRound();
      const participants = data.participants?.length ? data.participants : defaultData().participants;
      const winners = currentStage === "ended" ? (currentWinners.length ? currentWinners : round.winners || []) : round.winners || [];
      const isOverview = currentStage === "overview";

      screen.classList.toggle("is-overview", isOverview);
      screen.classList.toggle("is-draw", !isOverview);
      screen.classList.toggle("running", currentStage === "running");
      screen.classList.toggle("ended", currentStage === "ended");
      screen.classList.toggle("few-names", participants.length <= 10);
      $("eventName").textContent = data.eventName || "VIP礼品直播抽奖";
      $("roundName").textContent = isOverview ? "抽奖轮次总览" : (round.name || "当前轮次");
      $("drawRoundLabel").textContent = round.name || "当前轮次";
      $("prizeName").textContent = round.prizeName || "神秘礼品";
      $("winnerCount").textContent = buildPrizeMeta(round);
      $("statusText").textContent = currentStage === "overview" ? "总览" : currentStage === "ready" ? "准备中" : currentStage === "running" ? "抽奖中" : currentStage === "ended" ? "已开奖" : "待准备";
      $("ticker").textContent = currentStage === "overview"
        ? "请选择要进入的抽奖轮次，前台即可完成准备、开始与开奖。"
        : currentStage === "running"
        ? "名单正在高速滚动，幸运嘉宾即将揭晓。"
        : currentStage === "ended"
          ? `本轮奖品：${round.prizeName || "神秘礼品"}，恭喜 ${winners.join("、")}。`
          : "点击“开始抽奖”后球体高速滚动；点击“抽奖结束”后显示中奖名单。";
      renderOverview();
      renderPrize(round);
      renderSphere(participants);
      renderWinners(winners);
      if (currentStage === "ended" && lastStage !== "ended") fireConfetti();
      lastStage = currentStage;
      saveScreenState();
    }

    function renderPrize(round) {
      const box = $("prizeImage");
      box.innerHTML = "";
      const image = getPrizeImage(round);
      if (image) {
        const img = document.createElement("img");
        img.src = image;
        img.alt = round.prizeName || "奖品图片";
        box.appendChild(img);
      } else {
        const gift = document.createElement("div");
        gift.className = "gift-fallback";
        gift.textContent = "礼";
        box.appendChild(gift);
      }
    }

    function renderSphere(names) {
      const sphere = $("sphere");
      sphere.innerHTML = "";
      const display = names.slice(0, 48);
      const count = Math.max(display.length, 1);
      sphere.classList.toggle("sparse", count <= 10);
      sphere.classList.toggle("medium", count > 10 && count <= 20);
      sphere.classList.toggle("dense", count > 20);
      const radius = count <= 10 ? 310 : count <= 20 ? 290 : 260;
      display.forEach((name, index) => {
        const chip = document.createElement("div");
        chip.className = "chip";
        chip.textContent = name;
        const theta = Math.acos(-1 + (2 * index) / count);
        const phi = Math.sqrt(count * Math.PI) * theta;
        const x = Math.cos(phi) * Math.sin(theta) * radius;
        const y = Math.sin(phi) * Math.sin(theta) * radius;
        const z = Math.cos(theta) * radius;
        chip.style.transform = `translate(-50%, -50%) translate3d(${x}px, ${y}px, ${z}px)`;
        sphere.appendChild(chip);
      });
    }

    function renderWinners(winners) {
      const board = document.querySelector(".winner-board");
      const grid = $("winnerGrid");
      board.classList.toggle("single-winner", winners.length === 1);
      board.classList.toggle("few-winners", winners.length > 1 && winners.length <= 6);
      grid.innerHTML = "";
      if (!winners.length) {
        const card = document.createElement("div");
        card.className = "winner-card";
        card.textContent = "待揭晓";
        grid.appendChild(card);
        return;
      }
      winners.forEach((name) => {
        const card = document.createElement("div");
        card.className = "winner-card";
        card.textContent = name;
        grid.appendChild(card);
      });
    }

    function fireConfetti() {
      const canvas = $("confetti");
      const ctx = canvas.getContext("2d");
      const dpr = window.devicePixelRatio || 1;
      canvas.width = innerWidth * dpr;
      canvas.height = innerHeight * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      const pieces = Array.from({ length: 360 }, () => ({
        x: Math.random() * innerWidth,
        y: -30 - Math.random() * innerHeight * .35,
        size: 4 + Math.random() * 9,
        speed: 2.6 + Math.random() * 6.4,
        spin: Math.random() * Math.PI,
        drift: -2.4 + Math.random() * 4.8,
        color: Math.random() > .18 ? "#f8cf74" : "#fff1b9",
        burst: Math.random() > .62
      }));
      clearTimeout(confettiTimer);
      let frame = 0;
      function tick() {
        ctx.clearRect(0, 0, innerWidth, innerHeight);
        pieces.forEach((p) => {
          p.y += p.speed;
          p.x += p.drift + Math.sin(frame / 18 + p.spin);
          p.spin += .08;
          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.rotate(p.spin);
          ctx.fillStyle = p.color;
          if (p.burst) {
            ctx.beginPath();
            ctx.arc(0, 0, p.size * 1.2, 0, Math.PI * 2);
            ctx.fill();
          } else {
            ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 1.9);
          }
          ctx.restore();
        });
        if (frame % 24 === 0 && frame < 170) drawGoldBurst(ctx, Math.random() * innerWidth, innerHeight * (.18 + Math.random() * .36), 34 + Math.random() * 24);
        frame++;
        if (frame < 300) requestAnimationFrame(tick);
        else ctx.clearRect(0, 0, innerWidth, innerHeight);
      }
      tick();
      confettiTimer = setTimeout(() => ctx.clearRect(0, 0, innerWidth, innerHeight), 9000);
    }

    function drawGoldBurst(ctx, x, y, radius) {
      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      for (let i = 0; i < 34; i++) {
        const angle = (Math.PI * 2 * i) / 34;
        const length = radius * (.55 + Math.random() * .7);
        ctx.strokeStyle = i % 3 === 0 ? "#fff1b9" : "#f8cf74";
        ctx.lineWidth = 1 + Math.random() * 2.4;
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(x + Math.cos(angle) * length, y + Math.sin(angle) * length);
        ctx.stroke();
      }
      ctx.restore();
    }

    function enterRound(roundId) {
      selectedRoundId = roundId;
      currentStage = "ready";
      currentWinners = getRound().winners || [];
      render();
    }

    function backOverview() {
      currentStage = "overview";
      currentWinners = [];
      render();
    }

    function startDraw() {
      currentStage = "running";
      currentWinners = [];
      render();
    }

    function drawWinners(round) {
      const targetCount = Math.max(1, Number(round.winnerCount) || 1);
      const previous = new Set((data.records || []).filter((record) => record.roundId !== round.id).flatMap((record) => record.winners || []));
      const fixed = (round.fixedWinners || []).filter((name) => data.participants.includes(name)).slice(0, targetCount);
      const fixedSet = new Set(fixed);
      const pool = data.participants.filter((name) => !previous.has(name) && !fixedSet.has(name));
      for (let i = pool.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [pool[i], pool[j]] = [pool[j], pool[i]];
      }
      const winners = [...fixed, ...pool].slice(0, targetCount);
      if (winners.length < targetCount) {
        const winnerSet = new Set(winners);
        const refill = data.participants.filter((name) => !winnerSet.has(name) && !fixedSet.has(name));
        for (let i = refill.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [refill[i], refill[j]] = [refill[j], refill[i]];
        }
        winners.push(...refill.slice(0, targetCount - winners.length));
      }
      return winners;
    }

    function endDraw() {
      const round = getRound();
      if (!round.id) return;
      const winners = drawWinners(round);
      currentWinners = winners;
      round.winners = winners;
      data.records = data.records || [];
      data.records = data.records.filter((record) => record.roundId !== round.id);
      data.records.push({
        roundId: round.id,
        roundName: round.name,
        prizeName: round.prizeName,
        winners,
        time: Date.now()
      });
      saveData();
      currentStage = "ended";
      render();
    }

    function toggleBgm() {
      if (bgmPlaying) {
        stopBgm();
      } else {
        startBgm();
      }
    }

    function startBgm() {
      bgmAudio = bgmAudio || new Audio("assets/vip-lottery-bgm.flac");
      bgmAudio.loop = true;
      bgmAudio.volume = 0.72;
      bgmAudio.play().then(() => {
        bgmPlaying = true;
        $("audioBtn").textContent = "♫";
        $("audioBtn").classList.remove("muted");
      }).catch(() => {
        bgmPlaying = false;
        $("audioBtn").textContent = "♪";
        $("audioBtn").classList.add("muted");
      });
    }

    function stopBgm() {
      bgmPlaying = false;
      if (bgmAudio) bgmAudio.pause();
      $("audioBtn").textContent = "♪";
      $("audioBtn").classList.add("muted");
    }

    $("audioBtn").addEventListener("click", toggleBgm);
    $("backOverviewBtn").addEventListener("click", backOverview);
    $("startDrawBtn").addEventListener("click", startDraw);
    $("endDrawBtn").addEventListener("click", endDraw);
    window.addEventListener("storage", (event) => {
      if (event.key === STORE_KEY) render();
      if (event.key === SCREEN_KEY && !event.newValue) {
        currentStage = "overview";
        currentWinners = [];
        render();
      }
    });
    window.addEventListener("resize", render);
    render();
  </script>
</body>
</html>
